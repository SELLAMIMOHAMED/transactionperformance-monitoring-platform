<!DOCTYPE html>
<html>
<head>
    <title>Nettoyage des données</title>
</head>
<body>

<h1>Nettoyage des données</h1>

<p>
    Nombre actuel de lignes :
    <strong>{{ total_rows }}</strong>
</p>

<form method="POST">

    <p>
        <input type="checkbox" name="remove_duplicates">
        Supprimer les doublons
    </p>

    <p>
        <input type="checkbox" name="remove_missing">
        Supprimer les valeurs manquantes
    </p>

    <p>
        <input type="checkbox" name="remove_negative">
        Supprimer les montants négatifs
    </p>

    <button type="submit">
        Nettoyer les données
    </button>
    <br><br>

<a href="/export-clean">
    <button type="button">
        Exporter les données nettoyées
    </button>
</a>

</form>

{% if message %}
    <h3>{{ message }}</h3>
{% endif %}

</body>
</html>
