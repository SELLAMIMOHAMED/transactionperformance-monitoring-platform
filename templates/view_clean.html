<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Données nettoyées</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">
        Données nettoyées
    </h2>

    <p>
        Nombre de lignes :
        <strong>{{ total_rows }}</strong>
    </p>

    <div class="table-responsive">

        {{ table|safe }}

    </div>

    <br>

    <a href="{{ url_for('clean') }}"
       class="btn btn-secondary">

        Retour

    </a>

</div>

</body>

</html>
